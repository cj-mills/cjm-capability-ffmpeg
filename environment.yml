name: cjm-capability-ffmpeg
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - ffmpeg
  - pip
  - pip:
    # Core Infrastructure: the substrate is AUTO-INJECTED by install-all (schema v2),
    # so it is NOT listed here (listing it pre-empts --substrate-source).

    # Result DTOs (the data nouns this pure-compute tool returns).
    - cjm-capability-primitives

    # Utilities
    - fastcore
    - pydantic
    - tqdm  # progress bars for ffmpeg subprocess runs (utils.progress; formerly pulled in via cjm-ffmpeg-utils)

    # Worker dependencies
    - fastapi
    - uvicorn
    - psutil
    - httpx
