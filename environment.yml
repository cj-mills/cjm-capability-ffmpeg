name: cjm-media-plugin-ffmpeg
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - ffmpeg
  - pip
  - pip:
    # Core Infrastructure
    - cjm-plugin-system

    # Tier 2 Interface
    - cjm-media-plugin-system

    # Utilities
    - fastcore
    - pydantic
    - tqdm  # progress bars for ffmpeg subprocess runs (utils.progress; formerly pulled in via cjm-ffmpeg-utils)

    # Worker dependencies
    - fastapi
    - uvicorn
    - psutil
    - httpx
